<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css" integrity="sha384-xOolHFLEh07PJGoPkLv1IbcEPTNtaed2xpHsD9ESMhqIYd0nLMwNLD69Npy4HI+N" crossorigin="anonymous">
    <link rel="stylesheet" href="./assets/css/style.css">
    <title>Comments</title>
</head>
<body>
    <div class="container mt-5">
        <div class="row">
            <div class="col-md-6 offset-md-3">
                <div class="card">
                    <div class="card-body">
                        <form action="" id="commentForm">
                            <div class="form-goup">
                                <label for="name">Title*</label>
                                <input type="text" id="name" class="form-control" required>
                            </div>
                            <div class="form-goup">
                                <label for="email">Email*</label>
                                <input type="email" class="form-control" id="email"  required>
                            </div>
                            <div class="form-goup">
                                <label for="body">Body*</label>
                                <textarea class="form-control" id="body" rows="4" required></textarea>
                            </div>
                            <div class="form-goup">
                                <label for="postId">Post ID*</label>
                                <input type="number" class="form-control mb-3" id="postId" required>
                            </div>

                            <button id="addBtn" class="btn btn-outline-primary btn-block">Add Comment</button>
                            <button id="updateBtn" type="button" class="d-none btn btn-outline-primary btn-block">Update Comment</button>

                        </form>
                    </div>
                </div>
            </div>
        </div>
        <div class="row" id="commentContainer">
            <!-- <div class="col-md-3 mt-5">
                <div class="card">
                    <div class="card-header">
                        <h3></h3>
                    </div>
                    <div class="card-body">
                        <b></b>
                        <p></p>
                    </div>
                    <div class="card-footer d-flex justify-content-between">
                        <i class="fa-solid fa-pen-to-square fa-2x text-primary"></i>
                        <i class="fa-solid fa-trash-can fa-2x text-danger"></i>
                    </div>
                </div>
            </div> -->
        </div>
    </div>

    <div class="spinner d-none" id="spinner">
        <div class="spinner-border" role="status">
         <span class="sr-only">Loading...</span>
    </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/jquery@3.5.1/dist/jquery.slim.min.js" integrity="sha384-DfXdz2htPH0lsSSs5nCTpuj/zy4C+OGpamoFVy38MVBnE+IbbVYUew+OrCXaRkfj" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.1/dist/umd/popper.min.js" integrity="sha384-9/reFTGAW83EW2RDu2S0VKaIzap3H66lZH81PoYlFhbGU+6BZp6G7niu735Sk7lN" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.min.js" integrity="sha384-+sLIOodYLS7CIrQpBjl+C7nPvqq+FbNUBDunl/OZv93DB7Ln/533i8e/mZXLi/P+" crossorigin="anonymous"></script>
    <script src="./assets/js/app.js"></script>
</body>
</html>
